services:
  app:
    build: .
    container_name: studiamatch-dev
    volumes:
      - .:/app
      - /app/web/node_modules
      - /app/venv
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

  db:
    image: postgres:15
    container_name: studiamatch-db-predesa
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: predesarrollo_password
      POSTGRES_DB: studiamatch_predesa
    volumes:
      - pgdata_predesa:/var/lib/postgresql/data

volumes:
  pgdata_predesa: