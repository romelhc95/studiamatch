name: FG2 - StudIAMatch Golden Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # Diario: 02:00 UTC (Rolling Shard)
  workflow_dispatch:      # Manual

concurrency:
  group: studiamatch-fg2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 🚉 STATION 1: Massive Discovery & Harvesting
  # -------------------------------------------------------------
  phase_1_harvesting:
    name: "1. Massive Harvesting"
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-noble
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (system python)
        run: |
          apt-get update && apt-get install -y python3-pip
          pip3 install --break-system-packages -r requirements.txt
          playwright install chromium
      - name: Set Job Start Time
        run: echo "JOB_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - name: Run Master Orchestrator (Harvesting Only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_START_TIME: ${{ env.JOB_START_TIME }}
        run: python3 scripts/core/master_orchestrator.py --limit 5 --skip-cleansing

  # 🚉 STATION 1.5: High Fidelity Cleansing
  # -------------------------------------------------------------
  phase_1_5_cleansing:
    name: "1.5. High Fidelity Cleansing"
    needs: phase_1_harvesting
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Cleansing Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/core/cleansing_worker.py

  # 🚉 STATION 2: AI Enrichment (14 Metadata Pillars)
  # -------------------------------------------------------------
  phase_2_enrichment:
    name: "2. AI Enrichment (14 Pillars)"
    needs: phase_1_5_cleansing
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Multicloud AI Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/core/enrichment_worker.py

  # 🚉 STATION 3: Production Sync (Vectors & Slugs)
  # -------------------------------------------------------------
  phase_3_sync:
    name: "3. Integrity & Sync"
    needs: phase_2_enrichment
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Sync to Production Courses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/core/sync_vector_worker.py

  # 🚉 STATION 4: ROI & QA Audit
  # -------------------------------------------------------------
  phase_4_audit:
    name: "4. ROI & QA Audit"
    needs: phase_3_sync
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Quality Assurance Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/maintenance/quality_assurance_audit.py
      - name: Taxonomy & ROI Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONIOENCODING: utf-8
        run: python scripts/maintenance/taxonomy_roi_audit.py
      - name: Upload Final Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-audit-reports-${{ github.ref_name }}
          path: docs/qa-engineer/
