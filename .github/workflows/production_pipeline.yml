name: StudIAMatch Golden Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Semanal: Descubrimiento Total (Dom 00:00)
    - cron: '0 5 * * *' # Diario: Enriquecimiento y Auditoría (05:00)
  push:
    branches: [ main, desarrollo, certificacion ]
  workflow_dispatch:      # Manual: Ejecución bajo demanda

jobs:
  # Nivel 1: Descubrimiento y Extracción
  harvesting:
    name: "1. Discovery & Harvesting"
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Run Master Orchestrator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/core/master_orchestrator.py --limit 20

  # Nivel 2: Enriquecimiento IA (Los 14 Pilares)
  ia_enrichment:
    name: "2. AI Enrichment (14 Pillars)"
    needs: harvesting
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: LLM Enrichment (Cloudflare Workers AI)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/core/llm_enrichment_worker.py --provider auto

  # Nivel 3: QA y Auditoría de Integridad
  quality_audit:
    name: "3. Integrity & ROI Audit"
    needs: ia_enrichment
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Run Integrity Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/maintenance/quality_assurance_audit.py
