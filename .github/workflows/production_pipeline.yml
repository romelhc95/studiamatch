name: StudIAMatch Golden Pipeline

on:
  schedule:
    - cron: '0 5 * * *' # Diario: Solo se ejecutará en 'main' (Producción) por defecto de GitHub
  workflow_dispatch:      # Manual: Permitido para todas las ramas (Desarrollo/Certificación)
  push:
    branches: [ main, desarrollo, certificacion ]

jobs:
  harvesting:
    name: "1. Discovery & Harvesting"
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Run Master Orchestrator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/core/master_orchestrator.py --limit 20

  ia_enrichment:
    name: "2. AI Enrichment (14 Pillars)"
    needs: harvesting
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: LLM Enrichment (Cloudflare Workers AI)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/core/llm_enrichment_worker.py --provider auto

  quality_audit:
    name: "3. Integrity & ROI Audit"
    needs: ia_enrichment
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Run Integrity Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🔍 Ejecutando Auditoría de Integridad General..."
          python scripts/maintenance/quality_assurance_audit.py
          
      - name: Run Taxonomy & ROI Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          echo "🚀 Ejecutando Auditoría Crítica de Taxonomía y ROI..."
          python scripts/maintenance/taxonomy_roi_audit.py
          
      - name: Upload Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.ref_name }}
          path: docs/qa-engineer/
