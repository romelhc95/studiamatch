name: FG3 - Daily Integrity Management

on:
  schedule:
    - cron: '0 5 * * *' # Diario: 05:00 UTC
  workflow_dispatch:      # Manual

concurrency:
  group: studiamatch-fg3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integrity:
    name: "3. Daily Integrity Ping"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Integrity Ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_SUPABASE_SECRET_KEY: ${{ secrets.NEXT_SUPABASE_SECRET_KEY }}
          SUPABASE_KEY: ${{ secrets.NEXT_SUPABASE_SECRET_KEY }}
        working-directory: scripts/core
        run: python integrity_ping.py
