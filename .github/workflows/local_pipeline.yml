name: StudIAMatch Golden Pipeline

on:
  schedule:
    - cron: '0 5 * * *' # Diario: 5 AM
  workflow_dispatch:      # Manual
  push:
    branches: [ main, desarrollo, certificacion ]

jobs:
  # -------------------------------------------------------------
  # PHASE 0: Institution Inventory Management
  # -------------------------------------------------------------
  phase_0_inventory:
    name: "0. Institution Inventory"
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Discovery Institutions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/local/core/discovery_institutions.py

  # -------------------------------------------------------------
  # PHASE 1: Massive Discovery & Harvesting
  # -------------------------------------------------------------
  phase_1_harvesting:
    name: "1. Discovery & Harvesting"
    needs: phase_0_inventory
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run Master Orchestrator (Includes Harvester & Cleansing)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/local/core/master_orchestrator.py --limit 15

  # -------------------------------------------------------------
  # PHASE 2: AI Enrichment (14 Metadata Pillars)
  # -------------------------------------------------------------
  phase_2_enrichment:
    name: "2. AI Enrichment (14 Pillars)"
    needs: phase_1_harvesting
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Multicloud AI Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/local/core/enrichment_worker.py

  # -------------------------------------------------------------
  # PHASE 3: Integrity & Production Sync
  # -------------------------------------------------------------
  phase_3_sync:
    name: "3. Integrity & Sync"
    needs: phase_2_enrichment
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Sync to Production Courses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/local/core/sync_vector_worker.py

  # -------------------------------------------------------------
  # PHASE 4: ROI & QA Audit
  # -------------------------------------------------------------
  phase_4_audit:
    name: "4. ROI & QA Audit"
    needs: phase_3_sync
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'certificacion' && 'Certification') || 'Development' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Quality Assurance Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/local/maintenance/quality_assurance_audit.py
      - name: Taxonomy & ROI Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONIOENCODING: utf-8
        run: python scripts/local/maintenance/taxonomy_roi_audit.py
      - name: Upload Final Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-audit-reports-${{ github.ref_name }}
          path: docs/qa-engineer/
